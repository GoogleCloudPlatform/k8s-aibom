name: Test and Deploy (Kind)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Unit Tests
      run: make test

  e2e:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Create k8s Kind Cluster
      uses: helm/kind-action@v1.10.0

    - name: Build local image
      run: make image IMG=k8s-aibom:ci-test

    - name: Load image into Kind
      run: kind load docker-image k8s-aibom:ci-test --name chart-testing

    - name: Deploy Controller
      run: |
        helm install k8s-aibom ./charts/k8s-aibom \
          --namespace k8s-aibom-system \
          --create-namespace \
          --set image.repository=k8s-aibom \
          --set image.tag=ci-test \
          --set image.pullPolicy=Never
          
    - name: Verify Deployment
      run: |
        kubectl wait --for=condition=Available deployment/k8s-aibom -n k8s-aibom-system --timeout=120s
