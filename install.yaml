apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-aibom
  namespace: k8s-aibom-system
  labels:
    helm.sh/chart: k8s-aibom-1.0.0
    app.kubernetes.io/name: k8s-aibom
    app.kubernetes.io/instance: k8s-aibom
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-aibom
      app.kubernetes.io/instance: k8s-aibom
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-aibom
        app.kubernetes.io/instance: k8s-aibom
    spec:
      serviceAccountName: k8s-aibom
      securityContext:
        fsGroup: 2000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          image: "k8s-aibom:1.0.0"
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {}
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: tmp-dir
          emptyDir: {}
---
