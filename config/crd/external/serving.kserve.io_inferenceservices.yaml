# ⚠ TEST-ONLY CRD. ⚠
#
# Real clusters install KServe's full CRD via the KServe Helm chart or
# manifests. This minimal version exists solely so envtest can validate
# InferenceService creation against a schema that won't break when
# upstream KServe ships v1beta1 patch versions. Do NOT apply this file
# to a real cluster — it will conflict with the real KServe CRD and
# silently strip fields that real KServe expects.
#
# Minimal KServe InferenceService CRD scoped to the fields k8s-aibom
# extracts. NOT a vendored copy of upstream KServe's full CRD — the
# upstream CRD is multi-thousand-line and would couple our test setup
# to KServe's evolution.
#
# The fields this CRD explicitly schemas are:
#   - spec.predictor.model.modelFormat.name
#   - spec.predictor.model.runtime
#   - spec.predictor.model.storageUri
#   - spec.predictor.serviceAccountName
#
# Everything else under spec.predictor is permitted via
# x-kubernetes-preserve-unknown-fields, so customer InferenceService
# specs with additional fields (transformer, explainer, custom
# predictors, autoscaling, traffic config, etc.) still validate.
# k8s-aibom simply does not extract those fields in v1.
#
# Version-pinning policy: docs/external-crd-versions.md (when written
# in the final step of Phase 10) commits the controller to KServe
# serving.kserve.io/v1beta1. A KServe upgrade that introduces v1beta2
# or v1 with breaking changes to the four fields above requires
# explicit upgrade work — the scraper will silently extract nothing
# against the new version until updated.

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: inferenceservices.serving.kserve.io
  annotations:
    api-approved.kubernetes.io: "unapproved, k8s-aibom test fixture (minimal subset)"
spec:
  group: serving.kserve.io
  scope: Namespaced
  names:
    plural: inferenceservices
    singular: inferenceservice
    kind: InferenceService
    listKind: InferenceServiceList
    shortNames:
      - isvc
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                predictor:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  properties:
                    serviceAccountName:
                      type: string
                      maxLength: 253
                    model:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                      properties:
                        modelFormat:
                          type: object
                          properties:
                            name:
                              type: string
                              maxLength: 64
                            version:
                              type: string
                              maxLength: 64
                        runtime:
                          type: string
                          maxLength: 253
                        storageUri:
                          type: string
                          maxLength: 2048
                        args:
                          type: array
                          items:
                            type: string
                        env:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              value:
                                type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
